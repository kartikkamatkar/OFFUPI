# ============================================================================
# APPLICATION NAME
# ============================================================================
# This identifies the application in logs, metrics, and service discovery
spring.application.name=OFFUPI


# ============================================================================
# SERVER CONFIGURATION
# ============================================================================
# The port the embedded Tomcat server listens on
# Access the app at: http://localhost:8080
server.port=8080


# ============================================================================
# POSTGRESQL DATABASE CONFIGURATION
# ============================================================================
# Database connection URL
# jdbc:postgresql://[host]:[port]/[database_name]
# offupi-postgres is the container name (Docker service name)
spring.datasource.url=jdbc:postgresql://offupi-postgres:5432/offupi

# Database credentials
spring.datasource.username=postgres
spring.datasource.password=postgresql

# PostgreSQL JDBC driver class (tells Spring which driver to use)
spring.datasource.driver-class-name=org.postgresql.Driver


# ============================================================================
# JPA / HIBERNATE CONFIGURATION (Database ORM)
# ============================================================================
# ddl-auto=update means: Hibernate will automatically create/update database tables
# based on your @Entity classes. Great for development!
# Options: none, validate, update, create, create-drop
spring.jpa.hibernate.ddl-auto=update

# Show SQL statements in the console (useful for debugging)
spring.jpa.show-sql=true

# Format SQL nicely with line breaks and indentation (easier to read)
spring.jpa.properties.hibernate.format_sql=true

# Specify which database dialect to use (PostgreSQL specific SQL)
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect


# ============================================================================
# REDIS CONFIGURATION (In-memory cache for idempotency)
# ============================================================================
# Redis server host (Docker container name)
spring.data.redis.host=offupi-redis

# Redis server port (default Redis port)
spring.data.redis.port=6379


# ============================================================================
# KAFKA CONFIGURATION (Message queue for async processing)
# ============================================================================
# Kafka broker address (Docker container name and port)
spring.kafka.bootstrap-servers=offupi-kafka:9092

# --- Consumer Settings (Reading messages from Kafka) ---
# Consumer group ID - all consumers with same group share messages
spring.kafka.consumer.group-id=offupi-group

# Where to start reading if no offset is committed
# earliest = start from beginning, latest = start from newest messages
spring.kafka.consumer.auto-offset-reset=earliest

# Deserializers convert bytes back to Java objects
# Key deserializer: String keys (packetHash)
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer

# Value deserializer: JSON to PaymentEvent objects
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer

# --- Producer Settings (Sending messages to Kafka) ---
# Serializers convert Java objects to bytes
# Key serializer: String keys (packetHash)
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer

# Value serializer: PaymentEvent objects to JSON
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

# Trust all packages for JSON deserialization (allows PaymentEvent to be deserialized)
spring.kafka.consumer.properties.spring.json.trusted.packages=*


# ============================================================================
# ACTUATOR & MONITORING (Metrics and health checks)
# ============================================================================
# Expose ALL actuator endpoints (health, metrics, prometheus, etc.)
# * means "expose everything" - good for monitoring
management.endpoints.web.exposure.include=*

# Allow unrestricted access to Prometheus metrics endpoint
management.endpoint.prometheus.access=unrestricted

# Enable Prometheus metrics export (for Grafana dashboards)
management.prometheus.metrics.export.enabled=true

# Add a tag to all metrics to identify this application
management.metrics.tags.application=OFFUPI