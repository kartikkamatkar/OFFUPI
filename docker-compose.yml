services:

  postgres:
    image: postgres:16
    container_name: offupi-postgres
    environment:
      POSTGRES_DB: offupi
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgresql
    ports:
      - "5433:5432"
    restart: always

  redis:
    image: redis:7
    container_name: offupi-redis
    ports:
      - "6380:6379"
    restart: always

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: offupi-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    ports:
      - "2182:2181"
    restart: always

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: offupi-kafka
    depends_on:
      - zookeeper

    ports:
      - "9093:9092"

    environment:
      KAFKA_BROKER_ID: 1

      KAFKA_ZOOKEEPER_CONNECT: offupi-zookeeper:2181

      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092

      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://offupi-kafka:9092

      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT

      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

    restart: always

  prometheus:
    image: prom/prometheus
    container_name: offupi-prometheus
    ports:
      - "9091:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    restart: always

  grafana:
    image: grafana/grafana
    container_name: offupi-grafana
    ports:
      - "3001:3000"
    restart: always

  offupi-app:
    build: .
    container_name: offupi-app

    depends_on:
      - postgres
      - redis
      - kafka

    ports:
      - "8081:8080"

    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://offupi-postgres:5432/offupi
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgresql

      SPRING_DATA_REDIS_HOST: offupi-redis
      SPRING_DATA_REDIS_PORT: 6379

      SPRING_KAFKA_BOOTSTRAP_SERVERS: offupi-kafka:9092

    restart: always